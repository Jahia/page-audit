name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build module
        run: mvn -B clean install

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: page-audit-bundle
          path: target/page-audit-*.jar
          if-no-files-found: error
