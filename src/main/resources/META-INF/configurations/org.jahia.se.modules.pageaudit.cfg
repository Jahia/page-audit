# default configuration - won't be overriden
# Page Quality Audit - AI review configuration
#
# This file is deployed to: digital-factory-data/karaf/etc/org.jahia.se.modules.pageaudit.cfg
# Edit it there at runtime - changes take effect immediately without redeployment.
# The first line above prevents Jahia from overwriting operator edits on module redeploy.
# Never commit API keys to source control.
#
# The AI tab stays disabled (with a hint for administrators) until AI_API_KEY is set.
# The key is only ever used server-side; it is never sent to the browser.

# LLM provider: anthropic | openai | deepseek
AI_PROVIDER=anthropic

# Model identifier for the chosen provider
# anthropic: claude-sonnet-5, claude-haiku-4-5-20251001 ...
# openai:    gpt-4o, gpt-4o-mini ...
# deepseek:  deepseek-chat ...
AI_MODEL=claude-sonnet-5

# API key / token for the chosen provider. Leave blank to disable the AI tab.
AI_API_KEY=

# Maximum output tokens per review
AI_MAX_TOKENS=2048

# Pricing of the chosen model, in USD per 1 million tokens.
# Used to display the estimated cost of each review to editors.
# Defaults match claude-sonnet-5 list pricing; update when changing AI_MODEL.
AI_COST_INPUT_PER_MTOKENS=3.00
AI_COST_OUTPUT_PER_MTOKENS=15.00

# Optional extra instructions appended to the review prompt.
# Use this to adapt recommendations to your brand and editorial rules:
#   AI_PROMPT_APPENDIX=Tone of voice is formal French ("vous"). \
#     Product names must never be translated. Aim recommendations at non-technical editors.
AI_PROMPT_APPENDIX=
